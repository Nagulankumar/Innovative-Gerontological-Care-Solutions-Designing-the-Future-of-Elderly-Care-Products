<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign Up — MedRemind</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Atkinson+Hyperlegible:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<header class="topbar">
  <div class="topbar-inner">
    <div class="brand">
      <span class="brand-icon" aria-hidden="true">&#9877;</span>
      <span class="brand-name">MedRemind</span>
    </div>
  </div>
</header>

<main class="page login-page">
  <section class="login-card">
    <h1>Create Your Account</h1>
    <p class="login-sub">Sign up with your email to start tracking your medicines.</p>

    {% if error %}
      <p class="login-error">{{ error }}</p>
    {% endif %}

    <form method="POST" action="{{ url_for('signup') }}">
      <label for="email">Email Address</label>
      <input type="email" id="email" name="email" required autofocus placeholder="you@gmail.com">

      <label for="password">Password</label>
      <input type="password" id="password" name="password" required minlength="6">

      <label for="confirm_password">Confirm Password</label>
      <input type="password" id="confirm_password" name="confirm_password" required minlength="6">

      <button type="submit" class="btn btn-primary btn-large login-btn">Create Account</button>
    </form>

    <p class="login-switch">Already have an account? <a href="{{ url_for('login') }}">Log in</a></p>
  </section>
</main>

</body>
</html>
